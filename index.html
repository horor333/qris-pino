<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINO Payment - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw; 
        }

        /* Galaxy Background */
        #galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #0a0e17 0%, #000 100%); }
        #nebula-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; filter: blur(100px); background: radial-gradient(circle at 20% 30%, #4f46e5 0%, transparent 40%), radial-gradient(circle at 80% 70%, #7c3aed 0%, transparent 40%); animation: pulse 15s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.6; } }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* UI Card Styles */
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* SUPER SMOOTH ENTRANCE ANIMATION */
        .card-entry {
            opacity: 0;
            animation: smoothFadeInUp 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.3s;
        }

        @keyframes smoothFadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Transparan QR styles */
        .qr-area {
            position: relative;
            width: 256px;
            height: 256px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }
        
        #qris-img {
            width: 230px;
            height: 230px;
            object-fit: contain;
            /* Membuat warna selain hitam menjadi transparan */
            filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.5));
            mix-blend-mode: screen; /* Teknik blend agar background putih hilang */
        }

        .float { animation: floating 4s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Neon Zap Icon */
        .zap-icon {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #7c3aed;
            color: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 0 20px #7c3aed;
            animation: zapPulse 2s infinite;
        }
        @keyframes zapPulse { 0%, 100% { box-shadow: 0 0 10px #7c3aed; transform: scale(1); } 50% { box-shadow: 0 0 25px #a78bfa; transform: scale(1.1); } }

        .hidden-menu { display: none; }
        .btn-custom { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-custom:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-custom:active { transform: scale(0.97); filter: brightness(0.9); }
    </style>
</head>
<body onclick="playWelcome()">

    <div id="galaxy-bg"></div>
    <div id="nebula-bg"></div>
    <canvas id="stars"></canvas>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="audioWelcome" src="https://files.catbox.moe/6f7m8s.mp3" preload="auto"></audio>

    <div id="main-menu" class="max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden card-entry relative z-10 mx-4">
        <div class="bg-gradient-to-r from-indigo-950 via-slate-900 to-purple-950 p-10 text-center border-b border-white/5 relative">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">PAYMENT PINO</h1>
            <p class="text-indigo-300 text-[10px] font-bold tracking-[0.4em] mt-2 italic uppercase">Online Transaction</p>
        </div>

        <div class="p-8">
            <div class="flex justify-center my-6 relative">
                <div class="qr-area float">
                    <img id="qris-img" crossorigin="anonymous" src="https://files.catbox.moe/n18w69.jpeg" alt="QRIS PINO">
                    
                    <div class="zap-icon">
                        <i data-lucide="zap" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center transition hover:border-indigo-500/30">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Merchant</p>
                    <p class="text-sm font-bold text-slate-200 uppercase tracking-tighter">Pino Project</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center transition hover:border-emerald-500/30">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Sistem</p>
                    <div class="flex items-center justify-center gap-1.5">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <p class="text-sm font-bold text-emerald-400 uppercase">Online</p>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <button id="downloadBtn" onclick="handleDownload()" class="w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-[1.5rem] font-black text-lg uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-3">
                    <i data-lucide="download" class="w-6 h-6"></i> Unduh QR Code
                </button>
                
                <button onclick="toggleMenu('info')" class="w-full py-4 border border-white/10 text-slate-300 rounded-[1.5rem] font-bold text-sm uppercase tracking-widest hover:bg-white/5 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="info" class="w-4 h-4"></i> Info Lainnya
                </button>
            </div>
        </div>
    </div>

    <div id="info-menu" class="hidden-menu max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__fadeIn relative z-10 mx-4">
        <div class="bg-gradient-to-r from-purple-900 to-indigo-950 p-8 text-center border-b border-white/5">
            <h2 class="text-2xl font-black text-white tracking-widest uppercase">INFO PINO</h2>
            <p class="text-purple-300 text-[10px] font-bold tracking-[0.4em] mt-1 uppercase">Contact & Support</p>
        </div>

        <div class="p-8">
            <div class="space-y-4 mb-8">
                <button onclick="openLink('https://wa.me/6285850612361')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl font-bold text-white flex items-center gap-4 active:scale-95">
                    <div class="bg-white/20 p-2 rounded-lg"><i data-lucide="phone" class="w-5 h-5"></i></div>
                    <span class="text-sm">1. Nomor Utama Pino</span>
                </button>

                <button onclick="openLink('https://wa.me/6285864518943')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-indigo-600 to-indigo-800 rounded-2xl font-bold text-white flex items-center gap-4 active:scale-95">
                    <div class="bg-white/20 p-2 rounded-lg"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                    <span class="text-sm">2. Nomor Cadangan</span>
                </button>

                <button onclick="openLink('https://whatsapp.com/channel/0029VbBX1dXHQbS9YfGl951D')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-emerald-600 to-teal-800 rounded-2xl font-bold text-white flex items-center gap-4 active:scale-95">
                    <div class="bg-white/20 p-2 rounded-lg"><i data-lucide="star" class="w-5 h-5"></i></div>
                    <span class="text-sm">3. Info Stok / Testimoni</span>
                </button>

                <button onclick="openLink('https://chat.whatsapp.com/CRqVTgzwoisIvg6UYLfntM?mode=gi_t')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-amber-500 to-orange-700 rounded-2xl font-bold text-white flex items-center gap-4 active:scale-95">
                    <div class="bg-white/20 p-2 rounded-lg"><i data-lucide="users" class="w-5 h-5"></i></div>
                    <span class="text-sm">4. GC STOK FRESH</span>
                </button>
            </div>

            <button onclick="toggleMenu('main')" class="w-full py-4 bg-white/10 text-white rounded-[1.5rem] font-black text-sm uppercase tracking-widest hover:bg-white/20 transition-all flex items-center justify-center gap-2 active:scale-95">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke QRIS
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function playClick() {
            const sound = document.getElementById('clickSound');
            sound.currentTime = 0;
            sound.play().catch(e => {});
        }

        let welcomePlayed = false;
        function playWelcome() {
            if (!welcomePlayed) {
                document.getElementById('audioWelcome').play().catch(e => {});
                welcomePlayed = true;
            }
        }

        function openLink(url) {
            playClick();
            setTimeout(() => { window.open(url, '_blank'); }, 150);
        }

        function toggleMenu(target) {
            playClick();
            const mainMenu = document.getElementById('main-menu');
            const infoMenu = document.getElementById('info-menu');
            if(target === 'info') {
                mainMenu.classList.add('hidden-menu');
                infoMenu.classList.remove('hidden-menu');
            } else {
                infoMenu.classList.add('hidden-menu');
                mainMenu.classList.remove('hidden-menu');
            }
        }

        async function handleDownload() {
            playClick();
            const btn = document.getElementById('downloadBtn');
            btn.innerHTML = `<span class="animate-spin mr-2">◌</span> MENGUNDUH...`;
            try {
                const imgUrl = document.getElementById('qris-img').src;
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'QRIS-PINO.jpeg';
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                window.open(document.getElementById('qris-img').src, '_blank');
            } finally {
                btn.innerHTML = `<i data-lucide="download" class="w-6 h-6"></i> Unduh QR Code`;
                lucide.createIcons();
            }
        }

        // Stars Background
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];
        function setSize() {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
            stars = [];
            for(let i=0; i<150; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1.5, v: Math.random()*0.4 });
        }
        function draw() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= s.v; if(s.y < 0) s.y = h;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', setSize);
        setSize(); draw();
    </script>
</body>
</html>
