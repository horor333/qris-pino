<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINO Payment - Galactic Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        
        /* Galaxy Effect */
        #galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #0a0e17 0%, #000 100%); }
        #nebula-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; filter: blur(100px); background: radial-gradient(circle at 20% 30%, #4f46e5 0%, transparent 40%), radial-gradient(circle at 80% 70%, #7c3aed 0%, transparent 40%); animation: pulse 15s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.6; } }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* UI Styles */
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .qr-glow { animation: qrPulse 3s infinite; }
        @keyframes qrPulse { 0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); } 50% { box-shadow: 0 0 50px rgba(168, 85, 247, 0.5); } }
        .float { animation: floating 4s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body onclick="playWelcome()">

    <div id="galaxy-bg"></div>
    <div id="nebula-bg"></div>
    <canvas id="stars"></canvas>

    <audio id="audioWelcome" src="LINK_AUDIO_WELCOME_DISINI"></audio>
    <audio id="audioDownload" src="LINK_AUDIO_DOWNLOAD_DISINI"></audio>

    <div class="max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__fadeIn relative z-10 mx-4">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-10 text-center border-b border-white/10">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">PAYMENT PINO</h1>
            <p class="text-indigo-200 text-[10px] font-bold tracking-[0.4em] mt-2 italic uppercase">Cosmic Transaction</p>
        </div>

        <div class="p-8">
            <div class="flex justify-center my-6">
                <div class="qr-glow float bg-white p-5 rounded-[2.5rem] relative">
                    <img id="qris-img" crossorigin="anonymous" src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=LINK_PEMBAYARAN_KAMU" class="w-56 h-56 rounded-2xl">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span class="bg-white px-3 py-1 rounded-lg text-xs font-black text-indigo-600 shadow-md border border-slate-100">QRIS</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Merchant</p>
                    <p class="text-sm font-bold text-slate-200">PINO PROJECT</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Sistem</p>
                    <div class="flex items-center justify-center gap-1.5">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <p class="text-sm font-bold text-emerald-400 uppercase">Online</p>
                    </div>
                </div>
            </div>

            <button id="downloadBtn" onclick="handleDownload()" class="w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-[1.5rem] font-black text-lg uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-xl shadow-indigo-500/20">
                Unduh QR Code
            </button>
            
            <p class="text-center text-[10px] text-slate-500 mt-8 font-medium tracking-wide">
                Sentuh layar untuk suara sambutan.<br>QR akan langsung terunduh ke perangkat Anda.
            </p>
        </div>
    </div>

    <script>
        // --- Audio Logic ---
        let welcomePlayed = false;
        const welcomeAudio = document.getElementById('audioWelcome');
        const downloadAudio = document.getElementById('audioDownload');

        function playWelcome() {
            if (!welcomePlayed) {
                welcomeAudio.play().catch(e => console.log("User interaction required"));
                welcomePlayed = true;
            }
        }

        // --- Direct Download Logic ---
        async function handleDownload() {
            // Play Sound
            downloadAudio.play();
            
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerText;
            btn.innerText = "MENGUNDUH...";
            
            try {
                const img = document.getElementById('qris-img');
                const response = await fetch(img.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'QRIS-PINO-PAYMENT.png'; // Nama file hasil unduh
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                console.error("Download failed, opening in new tab as fallback.");
                window.open(document.getElementById('qris-img').src, '_blank');
            } finally {
                btn.innerText = originalText;
            }
        }

        // --- Starfield Background ---
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function setSize() {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
            stars = [];
            for(let i=0; i<150; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1.5, v: Math.random()*0.4 });
        }

        function draw() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= s.v; if(s.y < 0) s.y = h;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', setSize);
        setSize(); draw();
    </script>
</body>
</html>
