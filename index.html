<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINO Payment - Online Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        
        /* Galaxy Background */
        #galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #0a0e17 0%, #000 100%); }
        #nebula-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; filter: blur(100px); background: radial-gradient(circle at 20% 30%, #4f46e5 0%, transparent 40%), radial-gradient(circle at 80% 70%, #7c3aed 0%, transparent 40%); animation: pulse 15s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.6; } }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* UI Styles */
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .qr-glow { animation: qrPulse 3s infinite; }
        @keyframes qrPulse { 0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); } 50% { box-shadow: 0 0 50px rgba(168, 85, 247, 0.5); } }
        .float { animation: floating 4s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .qr-container img { width: 100%; height: 100%; object-fit: contain; border-radius: 1rem; }
        
        /* Hidden Class for Menu Switch */
        .hidden-menu { display: none; }
    </style>
</head>
<body onclick="playWelcome()">

    <div id="galaxy-bg"></div>
    <div id="nebula-bg"></div>
    <canvas id="stars"></canvas>

    <audio id="audioWelcome" src="LINK_AUDIO_WELCOME_DISINI"></audio>
    <audio id="audioDownload" src="LINK_AUDIO_DOWNLOAD_DISINI"></audio>

    <div id="main-menu" class="max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__fadeIn relative z-10 mx-4">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-10 text-center border-b border-white/10">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">PAYMENT PINO</h1>
            <p class="text-indigo-200 text-[10px] font-bold tracking-[0.4em] mt-2 italic uppercase">Online Transaction</p>
        </div>

        <div class="p-8">
            <div class="flex justify-center my-6">
                <div class="qr-glow float bg-white p-5 rounded-[2.5rem] relative w-64 h-64 flex items-center justify-center qr-container">
                    <img id="qris-img" crossorigin="anonymous" src="https://files.catbox.moe/n18w69.jpeg" alt="QRIS PINO">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Merchant</p>
                    <p class="text-sm font-bold text-slate-200">PINO PROJECT</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Sistem</p>
                    <div class="flex items-center justify-center gap-1.5">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <p class="text-sm font-bold text-emerald-400 uppercase">Online</p>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <button id="downloadBtn" onclick="handleDownload()" class="w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-[1.5rem] font-black text-lg uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-xl shadow-indigo-500/20">
                    Unduh QR Code
                </button>
                
                <button onclick="toggleMenu('info')" class="w-full py-4 border border-white/10 text-slate-300 rounded-[1.5rem] font-bold text-sm uppercase tracking-widest hover:bg-white/5 transition-all active:scale-95">
                    Info Lainnya
                </button>
            </div>
            
            <p class="text-center text-[10px] text-slate-500 mt-8 font-medium">
                Sentuh layar untuk suara sambutan.
            </p>
        </div>
    </div>

    <div id="info-menu" class="hidden-menu max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__fadeIn relative z-10 mx-4">
        <div class="bg-gradient-to-r from-purple-700 to-indigo-800 p-8 text-center border-b border-white/10">
            <h2 class="text-2xl font-black text-white tracking-widest uppercase">INFO MENU</h2>
            <p class="text-purple-200 text-[10px] font-bold tracking-[0.4em] mt-1 uppercase">Select Options</p>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="py-10 bg-white/5 border border-white/10 rounded-3xl font-bold text-slate-200 hover:bg-indigo-600/20 hover:border-indigo-500/50 transition-all active:scale-95">Tombol 1</button>
                <button class="py-10 bg-white/5 border border-white/10 rounded-3xl font-bold text-slate-200 hover:bg-indigo-600/20 hover:border-indigo-500/50 transition-all active:scale-95">Tombol 2</button>
                <button class="py-10 bg-white/5 border border-white/10 rounded-3xl font-bold text-slate-200 hover:bg-indigo-600/20 hover:border-indigo-500/50 transition-all active:scale-95">Tombol 3</button>
                <button class="py-10 bg-white/5 border border-white/10 rounded-3xl font-bold text-slate-200 hover:bg-indigo-600/20 hover:border-indigo-500/50 transition-all active:scale-95">Tombol 4</button>
            </div>

            <button onclick="toggleMenu('main')" class="w-full py-4 bg-white/10 text-white rounded-[1.5rem] font-black text-sm uppercase tracking-widest hover:bg-white/20 transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
                Kembali ke QRIS
            </button>
        </div>
    </div>

    <script>
        // --- Menu Toggle Logic ---
        function toggleMenu(target) {
            const mainMenu = document.getElementById('main-menu');
            const infoMenu = document.getElementById('info-menu');
            
            if(target === 'info') {
                mainMenu.classList.add('hidden-menu');
                infoMenu.classList.remove('hidden-menu');
            } else {
                infoMenu.classList.add('hidden-menu');
                mainMenu.classList.remove('hidden-menu');
            }
        }

        // --- Audio Logic ---
        let welcomePlayed = false;
        const welcomeAudio = document.getElementById('audioWelcome');
        const downloadAudio = document.getElementById('audioDownload');

        function playWelcome() {
            if (!welcomePlayed) {
                welcomeAudio.play().catch(e => {});
                welcomePlayed = true;
            }
        }

        // --- Direct Download Logic ---
        async function handleDownload() {
            downloadAudio.play();
            const btn = document.getElementById('downloadBtn');
            btn.innerText = "MENGUNDUH...";
            
            try {
                const imgUrl = document.getElementById('qris-img').src;
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'QRIS-PINO.jpeg';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                window.open(document.getElementById('qris-img').src, '_blank');
            } finally {
                btn.innerText = "UNDUH QR CODE";
            }
        }

        // --- Stars Animation ---
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function setSize() {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
            stars = [];
            for(let i=0; i<150; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1.5, v: Math.random()*0.4 });
        }

        function draw() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= s.v; if(s.y < 0) s.y = h;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', setSize);
        setSize(); draw();
    </script>
</body>
</html>
