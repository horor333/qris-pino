<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINO Payment - Cosmic Fusion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }

        /* Galaxy Background */
        #galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #0a0e17 0%, #000 100%); }
        #nebula-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; filter: blur(100px); background: radial-gradient(circle at 20% 30%, #4f46e5 0%, transparent 40%), radial-gradient(circle at 80% 70%, #7c3aed 0%, transparent 40%); animation: pulse 15s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.6; } }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }

        /* SMOOTH ENTRANCE */
        .card-entry { opacity: 0; animation: smoothFadeInUp 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; animation-delay: 0.2s; }
        @keyframes smoothFadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* QR AREA - COSMIC FUSION */
        .qr-cosmic-container {
            position: relative;
            width: 270px;
            height: 270px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 1. Bingkai Lingkaran Luar (Rotating Cosmic Ring) */
        .cosmic-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #ff0080, #7928ca, #ff0080, #0070f3, #ff0080);
            background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            box-shadow: 0 0 35px rgba(121, 40, 202, 0.6);
            animation: ringAnimation 10s linear infinite, glowPulse 4s infinite alternate;
        }

        @keyframes ringAnimation { 
            0% { transform: rotate(0deg); background-position: 0% 50%; } 
            50% { background-position: 100% 50%; }
            100% { transform: rotate(360deg); background-position: 0% 50%; } 
        }
        @keyframes glowPulse { 0% { box-shadow: 0 0 20px rgba(121, 40, 202, 0.4); } 100% { box-shadow: 0 0 50px rgba(255, 0, 128, 0.7); } }

        /* 2. QR IMAGE - RAINBOW SHADOW ON PATTERN */
        #qris-img {
            width: 215px;
            height: 215px;
            object-fit: contain;
            mix-blend-mode: screen; 
            border-radius: 12px;
            /* EFEK KUNCI: Membuat pola QR punya border pelangi menyala */
            filter: drop-shadow(0 0 1px #ff0080) 
                    drop-shadow(0 0 2px #7928ca) 
                    drop-shadow(0 0 4px #0070f3)
                    contrast(1.2) brightness(1.1);
        }

        /* 3. ZAP DECOR - RAINBOW ZAP */
        .zap-decor { 
            position: absolute; 
            filter: drop-shadow(0 0 3px #ff0080) 
                    drop-shadow(0 0 6px #7928ca);
            animation: zapRainbow 3s infinite, floating 4s ease-in-out infinite alternate; 
        }
        
        @keyframes zapRainbow {
            0%, 100% { color: #ff0080; opacity: 0.7; }
            33% { color: #7928ca; opacity: 1; }
            66% { color: #0070f3; opacity: 1; }
        }

        .float { animation: floatingArea 4s ease-in-out infinite; }
        @keyframes floatingArea { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .hidden-menu { display: none; }
        .btn-custom { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-custom:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-custom:active { transform: scale(0.97); }
    </style>
</head>
<body onclick="playWelcome()">

    <div id="galaxy-bg"></div>
    <div id="nebula-bg"></div>
    <canvas id="stars"></canvas>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="audioWelcome" src="https://files.catbox.moe/6f7m8s.mp3" preload="auto"></audio>

    <div id="main-menu" class="max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden card-entry relative z-10 mx-4">
        <div class="bg-gradient-to-r from-indigo-950 via-slate-900 to-purple-950 p-10 text-center border-b border-white/5">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase leading-tight">PAYMENT<br>PINO</h1>
            <p class="text-indigo-300 text-[10px] font-bold tracking-[0.4em] mt-2 italic uppercase">Online Transaction</p>
        </div>

        <div class="p-8">
            <div class="flex justify-center my-6 relative float">
                <div class="qr-cosmic-container">
                    <div class="cosmic-ring"></div>
                    
                    <img id="qris-img" crossorigin="anonymous" src="https://files.catbox.moe/n18w69.jpeg" alt="QRIS PINO">
                    
                    <div class="zap-decor top-1/2 -left-8 -translate-y-1/2"><i data-lucide="zap" class="w-7 h-7"></i></div>
                    <div class="zap-decor top-1/2 -right-8 -translate-y-1/2"><i data-lucide="zap" class="w-7 h-7"></i></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center"><p class="text-[10px] text-slate-500 font-bold uppercase">Merchant</p><p class="text-sm font-bold text-slate-200">Pino Project</p></div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center"><p class="text-[10px] text-slate-500 font-bold uppercase">Sistem</p><div class="flex items-center justify-center gap-1.5"><div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div><p class="text-sm font-bold text-emerald-400">Online</p></div></div>
            </div>

            <div class="space-y-4">
                <button id="downloadBtn" onclick="handleDownload()" class="w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-[1.5rem] font-black text-lg uppercase tracking-widest shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-3 active:scale-95 transition">
                    <i data-lucide="download" class="w-6 h-6"></i> Unduh QR Code
                </button>
                <button onclick="toggleMenu('info')" class="w-full py-4 border border-white/10 text-slate-300 rounded-[1.5rem] font-bold text-sm uppercase tracking-widest hover:bg-white/5 flex items-center justify-center gap-2 active:scale-95 transition">
                    <i data-lucide="info" class="w-4 h-4"></i> Info Lainnya
                </button>
            </div>
        </div>
    </div>

    <div id="info-menu" class="hidden-menu max-w-md w-full glass rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__fadeIn relative z-10 mx-4">
        <div class="bg-gradient-to-r from-purple-900 to-indigo-950 p-8 text-center border-b border-white/5"><h2 class="text-2xl font-black text-white uppercase tracking-widest">INFO PINO</h2><p class="text-purple-300 text-[10px] font-bold tracking-[0.4em] mt-1 uppercase text-center">Contact & Support</p></div>
        <div class="p-8 space-y-4">
            <button onclick="openLink('https://wa.me/6285850612361')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl font-bold text-white flex items-center gap-4"><div class="bg-white/20 p-2 rounded-lg"><i data-lucide="phone" class="w-5 h-5"></i></div><span class="text-sm">1. Nomor Utama Pino</span></button>
            <button onclick="openLink('https://wa.me/6285864518943')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-indigo-600 to-indigo-800 rounded-2xl font-bold text-white flex items-center gap-4"><div class="bg-white/20 p-2 rounded-lg"><i data-lucide="shield-check" class="w-5 h-5"></i></div><span class="text-sm">2. Nomor Cadangan</span></button>
            <button onclick="openLink('https://whatsapp.com/channel/0029VbBX1dXHQbS9YfGl951D')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-emerald-600 to-teal-800 rounded-2xl font-bold text-white flex items-center gap-4"><div class="bg-white/20 p-2 rounded-lg"><i data-lucide="star" class="w-5 h-5"></i></div><span class="text-sm">3. Info Stok / Testimoni</span></button>
            <button onclick="openLink('https://chat.whatsapp.com/CRqVTgzwoisIvg6UYLfntM?mode=gi_t')" class="w-full py-5 px-6 btn-custom bg-gradient-to-r from-amber-500 to-orange-700 rounded-2xl font-bold text-white flex items-center gap-4"><div class="bg-white/20 p-2 rounded-lg"><i data-lucide="users" class="w-5 h-5"></i></div><span class="text-sm">4. GC STOK FRESH</span></button>
            <button onclick="toggleMenu('main')" class="w-full py-4 bg-white/10 text-white rounded-[1.5rem] font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2 mt-4"><i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function playClick() { const s = document.getElementById('clickSound'); s.currentTime = 0; s.play().catch(e => {}); }
        let wPlay = false; function playWelcome() { if (!wPlay) { document.getElementById('audioWelcome').play().catch(e => {}); wPlay = true; } }
        function openLink(u) { playClick(); setTimeout(() => { window.open(u, '_blank'); }, 150); }
        function toggleMenu(t) { playClick(); const m = document.getElementById('main-menu'); const i = document.getElementById('info-menu'); if(t === 'info') { m.classList.add('hidden-menu'); i.classList.remove('hidden-menu'); } else { i.classList.add('hidden-menu'); m.classList.remove('hidden-menu'); } }
        async function handleDownload() {
            playClick(); const b = document.getElementById('downloadBtn'); b.innerHTML = `<span class="animate-spin mr-2">◌</span> UNDUH...`;
            try { const img = document.getElementById('qris-img').src; const r = await fetch(img); const bl = await r.blob(); const u = window.URL.createObjectURL(bl); const a = document.createElement('a'); a.href = u; a.download = 'QRIS-PINO.jpeg'; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(u); document.body.removeChild(a); } 
            catch (e) { window.open(document.getElementById('qris-img').src, '_blank'); } 
            finally { b.innerHTML = `<i data-lucide="download" class="w-6 h-6"></i> Unduh QR Code`; lucide.createIcons(); }
        }
        const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d'); let w, h, stars = [];
        function setSize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; stars = []; for(let i=0; i<150; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1.5, v: Math.random()*0.4 }); }
        function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= s.v; if(s.y < 0) s.y = h; }); requestAnimationFrame(draw); }
        window.addEventListener('resize', setSize); setSize(); draw();
    </script>
</body>
</html>
